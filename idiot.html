<body onload="init();">
    <p id="idiot">idiot! LOL</p>
    
    <div class="video-container">
        <video id="idiot-video" autoplay loop muted playsinline style="pointer-events: none;">
            <source src="idiot/idiot!.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <audio id="idiot-audio" src="https://github.com/potato7726/potato7726.github.io/releases/download/idk/idiot.mp4" loop autoplay></audio>

    <script>
        // Reliability script: if the browser blocks the audio autoplay,
        // it will trigger on the first click the user makes on the page.
        document.addEventListener('click', function() {
            const audio = document.getElementById('idiot-audio');
            const video = document.getElementById('idiot-video');
            audio.play();
            video.muted = false; // Unmutes video sync
        }, { once: true });
    </script>
</body>
