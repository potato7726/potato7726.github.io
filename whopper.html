            color: white;

<body>

    <video id="whopperVideo" autoplay loop playsinline>
        <source src="whoper.mp4" type="video/mp4">
        your web browser is too shit to launch the video.
    </video>

    <script>
        const video = document.getElementById('whopperVideo');
        const overlay = document.getElementById('unmute-overlay');

        // Start muted to ensure autoplay works
        video.muted = true;

        overlay.addEventListener('click', () => {
            video.muted = false;
            video.play();
            overlay.style.display = 'none'; // Hide overlay after interaction
