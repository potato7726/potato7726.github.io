<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Loop</title>
    <style>
        /* Optional: Makes the video fill the screen */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        video {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

    <audio id="idiotAudio" src="idiot!.mp3" loop></audio>

    <video id="idiotVideo" src="idiot!.mp4" loop muted playsinline></video>

    <script src="main.js"></script>

</body>
</html>
