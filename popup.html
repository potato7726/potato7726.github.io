<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>idiot</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background-color: black;
        }
        video {
            width: 100%; height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <video id="v" src="idiot/idiot!.mp4" autoplay loop muted playsinline></video>
    <audio id="a" src="idiot/idiot!.mp3" loop></audio>

    <script src="js/main.js"></script>
    <script>
        // This is the "Master Switch"
        // It waits for ANY click or ANY key press to start the chaos.
        const startChaos = () => {
            document.getElementById('a').play(); // Start the song
            document.getElementById('v').muted = false; // Unmute video
            
            if (typeof init === "function") {
                init(); // Launch your "You Are An Idiot" script
            }

            window.removeEventListener('click', startChaos);
            window.removeEventListener('keydown', startChaos);
        };

        window.addEventListener('click', startChaos);
        window.addEventListener('keydown', startChaos);
    </script>
</body>
</html>
