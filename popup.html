<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Loop</title>
    <style>
        /* Ensures the video covers the screen without scrollbars */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <audio id="idiotAudio" src="idiot/idiot!.mp3" loop></audio>

    <video id="idiotVideo" src="idiot/idiot.mp4" loop muted playsinline autoplay></video>

    <script src="idiot/main.js"></script>

</body>
</html>
