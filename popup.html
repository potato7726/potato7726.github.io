<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>idiot</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background-color: black;
        }
        #v {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: 1; /* Ensures video is visible */
        }
    </style>
</head>
<body>

    <video id="v" src="idiot/idiot!.mp4" autoplay loop muted playsinline></video>
    <audio id="a" src="idiot/idiot!.mp3" loop></audio>

    <script src="idiot/main.js"></script>
</body>
</html>
