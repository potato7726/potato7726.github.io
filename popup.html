<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>idiot</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background-color: black;
        }

        #idiotVideo {
            position: absolute;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover; 
            z-index: 1;
        }
    </style>
</head>
<body>

    <video id="idiotVideo" src="idiot/idiot!.mp4" autoplay loop muted playsinline></video>
    <audio id="idiotAudio" src="idiot/idiot!.mp3" loop></audio>

    <script>
        const playMedia = () => {
            // 1. Play audio and unmute video
            document.getElementById('idiotAudio').play();
            document.getElementById('idiotVideo').muted = false;

            // 2. Call the MalwarePad init function
            if (typeof init === "function") {
                init();
            }
        };

        // Triggers chaos on first click or key press
        window.addEventListener('click', playMedia, { once: true });
        window.addEventListener('keydown', playMedia, { once: true });
    </script>

    <script src="idiot/main.js"></script>

</body>
</html>
